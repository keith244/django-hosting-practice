{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <link rel="stylesheet" href="{% static 'host_with_DB/style.css' %}?v=1">
</head>

<body>
    <div class="container">
        <h1>Create Post</h1>
        <p>Write and publish a new post</p>

        <form method="POST" class="post-form">
            {% csrf_token %}

            <div class="form-group">
                <input type="text" name="title" placeholder="Post title" required>
            </div>

            <div class="form-group">
                <textarea name="content" placeholder="Write your content here..." required></textarea>
            </div>

            <button type="submit" class="read-btn">Publish</button>
            <a href="{% url 'index' %}">Go back to posts</a>
        </form>
    </div>
</body>
</html>
