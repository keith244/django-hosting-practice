{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'hosting_with_DB/css/style.css' %}">
    <title>Read Post</title>
</head>
<body>

    <div class="container">

        <div class="posts">
                <h3>{{ post.title }}</h3>
                <p>{{post.content}}</p>

                <a href="{% url 'delete_post' post.id %}" class="read-btn" onclick="return confirm('Are you sure you want to delete this post?');">
                    Delete Post
                </a>
        </div>


    </div>
    

</body>
</html>
